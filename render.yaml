services:
  - type: web
    name: travio-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        placeholder: "Your MongoDB connection string"
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        placeholder: "Your Google Gemini API Key"
      - key: FRONTEND_URL
        placeholder: "Your frontend Vercel domain (e.g. https://travio-frontend.vercel.app)"
